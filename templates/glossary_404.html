<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ページが見つかりません | Orivet 遺伝子解析 — Page Not Found</title>
<meta name="robots" content="noindex">
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background:#f8f9fa; color:#1f2937; padding:40px 20px; text-align:center; }
  h1 { color:#7c3aed; margin-bottom:14px; }
  p { color:#6b7280; margin-bottom:14px; }
  .lang-block { margin-bottom:24px; padding-bottom:24px; border-bottom:1px solid #e5e7eb; }
  .lang-block:last-of-type { border:none; }
  a { display:inline-block; padding:12px 24px; margin:6px; background:#7c3aed; color:#fff; text-decoration:none; border-radius:10px; font-weight:600; }
  a.alt { background:#fff; color:#7c3aed; border:1px solid #c4b5fd; }
</style>
</head>
<body>
  <div class="lang-block">
    <h1>📭 ページが見つかりません</h1>
    <p>「<code>{{ slug }}</code>」という {{ kind }} は辞書に存在しません。</p>
    <p>スペルミスや URL の入力間違いの可能性があります。</p>
    <div>
      <a href="/glossary">📖 辞書 TOP に戻る</a>
      <a href="/" class="alt">🏠 ホームに戻る</a>
    </div>
  </div>
  <div class="lang-block">
    <h1>📭 Page Not Found</h1>
    <p>"<code>{{ slug }}</code>" is not in the glossary.</p>
    <p>This may be a misspelling or URL typo.</p>
    <div>
      <a href="/glossary?lang=en">📖 Back to Glossary</a>
      <a href="/" class="alt">🏠 Home</a>
    </div>
  </div>
</body>
</html>
