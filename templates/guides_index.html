<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ガイド記事 — 遺伝子検査・繁殖計画・毛色遺伝学 | Orivet 遺伝子解析</title>
<meta name="description" content="Orivet 遺伝子検査の見方、COI（近親交配係数）の意味、毛色遺伝子の基本、ブリーダー向け繁殖計画など、犬の遺伝学を理解するためのガイド記事。">
<link rel="canonical" href="{{ canonical }}">

<meta property="og:type" content="website">
<meta property="og:title" content="ガイド記事 | Orivet 遺伝子解析">
<meta property="og:description" content="犬の遺伝子検査・繁殖計画・毛色遺伝学のガイド記事一覧。">
<meta property="og:url" content="{{ canonical }}">
<meta property="og:site_name" content="Orivet 遺伝子解析">

<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif; background:#f8f9fa; color:#1f2937; line-height:1.6; }
  header { background: linear-gradient(135deg, #4a1a7a, #e6007e); color:#fff; padding:24px 0; }
  header .container { max-width:900px; margin:0 auto; padding:0 20px; display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between; gap:12px; }
  header h1 { font-size:1.5em; }
  header .nav a { color:#fff; text-decoration:none; padding:6px 14px; border-radius:8px; font-size:0.85em; border:1px solid rgba(255,255,255,0.3); background:rgba(255,255,255,0.15); margin-left:6px; }

  .container { max-width:900px; margin:0 auto; padding:24px 20px; }
  .breadcrumb { margin-bottom:16px; font-size:0.85em; color:#6b7280; }
  .breadcrumb a { color:#7c3aed; text-decoration:none; }

  .intro { background:#fff; padding:22px 28px; border-radius:14px; margin-bottom:20px; border:1px solid #e5e7eb; }
  .intro h2 { color:#4a1a7a; margin-bottom:8px; }

  .guide-grid { display:grid; gap:16px; }
  @media (min-width:640px) { .guide-grid { grid-template-columns: repeat(2, 1fr); } }

  .guide-card {
    background:#fff; padding:20px 24px; border-radius:12px; border:1px solid #e5e7eb;
    transition: all 0.15s; display:block; text-decoration:none; color:inherit;
  }
  .guide-card:hover { border-color:#7c3aed; transform: translateY(-2px); box-shadow:0 4px 12px rgba(124,58,237,0.1); }
  .guide-card .meta { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:8px; font-size:0.78em; }
  .guide-card .badge-category { background:#ede9fe; color:#5b21b6; padding:2px 9px; border-radius:9px; }
  .guide-card .badge-time { background:#f3f4f6; color:#6b7280; padding:2px 9px; border-radius:9px; }
  .guide-card h3 { color:#4a1a7a; font-size:1.1em; margin-bottom:8px; line-height:1.4; }
  .guide-card p { color:#374151; font-size:0.9em; }
  .guide-card .read-more { display:inline-block; margin-top:10px; color:#7c3aed; font-weight:600; font-size:0.9em; }

  @media (max-width:480px) {
    .container { padding:14px; }
    .intro { padding:16px 18px; }
    .guide-card { padding:16px 18px; }
    body { padding-bottom:env(safe-area-inset-bottom); }
  }
</style>
</head>
<body>

<header>
  <div class="container">
    <div>
      <h1>📚 ガイド記事</h1>
    </div>
    <div class="nav">
      <a href="/">解析する</a>
      <a href="/glossary">📖 辞書</a>
      <a href="/simulator">🐕 シミュレーター</a>
    </div>
  </div>
</header>

<div class="container">
  <nav class="breadcrumb" aria-label="パンくず">
    <a href="/">ホーム</a> &raquo; <span>ガイド記事</span>
  </nav>

  <div class="intro">
    <h2>遺伝子検査・繁殖計画の基礎ガイド</h2>
    <p>初めて愛犬の遺伝子検査結果を受け取った方、繁殖計画を立てているブリーダーの方、毛色遺伝学に興味のある方に向けた解説記事です。</p>
  </div>

  <div class="guide-grid">
    {% for guide in guides %}
    <a href="/guides/{{ guide.slug }}" class="guide-card">
      <div class="meta">
        <span class="badge-category">{{ guide.category }}</span>
        <span class="badge-time">⏱ {{ guide.reading_time }}</span>
      </div>
      <h3>{{ guide.title }}</h3>
      <p>{{ guide.summary }}</p>
      <span class="read-more">続きを読む →</span>
    </a>
    {% endfor %}
  </div>
</div>

</body>
</html>
