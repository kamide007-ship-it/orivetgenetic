<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>解析レポート - Orivet Genetics Suite</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif;
            background: #f3f4f6;
        }
        .toolbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        .toolbar a, .toolbar button {
            color: #fff;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.9em;
            font-weight: 500;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.1);
            cursor: pointer;
            transition: background 0.2s;
        }
        .toolbar a:hover, .toolbar button:hover {
            background: rgba(255,255,255,0.25);
        }
        .toolbar .title {
            color: #fff;
            font-weight: 600;
            font-size: 1em;
            border: none;
            background: none;
            padding: 0;
        }
        .report-frame {
            width: 100%;
            border: none;
            min-height: calc(100vh - 52px);
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <span class="title" id="toolbarTitle">Orivet Genetics Suite - レポート</span>
        <div>
            <button type="button" id="langToggle" onclick="toggleLang()">English</button>
            <a href="/simulator?session={{ session_id }}" id="linkSim">シミュレーターで使う</a>
            {% if xlsx_exists %}
            <a href="/download/{{ session_id }}/report.xlsx" id="linkXlsx">Excel ダウンロード</a>
            {% endif %}
            <a href="/" id="linkNew">新しい解析</a>
        </div>
    </div>
    <iframe class="report-frame" id="reportFrame" srcdoc="{{ report_html | e }}"></iframe>
    <script>
        const TOOLBAR_I18N = {
            en: {
                toolbarTitle: "Orivet Genetics Suite - Report",
                linkSim: "Use in Simulator",
                linkXlsx: "Download Excel",
                linkNew: "New Analysis"
            },
            ja: {
                toolbarTitle: "Orivet Genetics Suite - レポート",
                linkSim: "シミュレーターで使う",
                linkXlsx: "Excel ダウンロード",
                linkNew: "新しい解析"
            }
        };

        let currentLang = localStorage.getItem('appLang') || 'ja';

        function applyToolbarLang(lang) {
            const dict = TOOLBAR_I18N[lang];
            for (const [id, text] of Object.entries(dict)) {
                const el = document.getElementById(id);
                if (el) el.textContent = text;
            }
            document.getElementById('langToggle').textContent = lang === 'ja' ? 'English' : '日本語';
            document.title = lang === 'en' ? 'Analysis Report - Orivet Genetics Suite' : '解析レポート - Orivet Genetics Suite';
        }

        function applyIframeLang(lang) {
            const iframe = document.getElementById('reportFrame');
            try {
                const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                if (iframeDoc && typeof iframeDoc.__applyLang === 'function') {
                    iframeDoc.__applyLang(lang);
                } else if (iframe.contentWindow && typeof iframe.contentWindow.__applyLang === 'function') {
                    iframe.contentWindow.__applyLang(lang);
                }
            } catch (e) {}
        }

        function toggleLang() {
            currentLang = currentLang === 'ja' ? 'en' : 'ja';
            localStorage.setItem('appLang', currentLang);
            applyToolbarLang(currentLang);
            applyIframeLang(currentLang);
        }

        applyToolbarLang(currentLang);

        document.getElementById('reportFrame').addEventListener('load', function() {
            applyIframeLang(currentLang);
        });
    </script>
</body>
</html>
