<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>解析レポート - Orivet Genetics Suite</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#7c3aed">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="/static/icon-192.svg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif;
            background: #f3f4f6;
        }
        .toolbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        .toolbar a, .toolbar button {
            color: #fff;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.9em;
            font-weight: 500;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.1);
            cursor: pointer;
            transition: background 0.2s;
        }
        .toolbar a:hover, .toolbar button:hover {
            background: rgba(255,255,255,0.25);
        }
        .toolbar .title {
            color: #fff;
            font-weight: 600;
            font-size: 1em;
            border: none;
            background: none;
            padding: 0;
        }
        .report-frame {
            width: 100%;
            border: none;
            min-height: calc(100dvh - 52px); /* iOS Safari 100vh バグ回避 */
        }
        .breed-recs {
            background: #fffbeb;
            border-bottom: 1px solid #fde68a;
            padding: 10px 24px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            font-size: 0.88em;
            color: #92400e;
        }
        .breed-recs .label {
            font-weight: 600;
            white-space: nowrap;
        }
        .breed-recs a {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 12px;
            background: #fff;
            color: #92400e;
            text-decoration: none;
            border-radius: 14px;
            border: 1px solid #fde68a;
            transition: background 0.15s;
        }
        .breed-recs a:hover { background: #fef3c7; }
        .breed-recs .close-btn {
            margin-left: auto;
            background: none;
            border: none;
            color: #92400e;
            cursor: pointer;
            font-size: 1.1em;
            padding: 0 4px;
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <span class="title" id="toolbarTitle">Orivet Genetics Suite - レポート</span>
        <div>
            <button type="button" id="langToggle" onclick="toggleLang()">English</button>
            <a href="/simulator?session={{ session_id }}" id="linkSim">シミュレーターで使う</a>
            <a href="/glossary" id="linkGlossary">📖 辞書</a>
            {% if xlsx_exists %}
            <a href="/download/{{ session_id }}/report.xlsx" id="linkXlsx">Excel ダウンロード</a>
            {% endif %}
            <a href="/" id="linkNew">新しい解析</a>
        </div>
    </div>
    {% if breed_guides %}
    <div class="breed-recs" id="breedRecs">
      <span class="label" id="breedRecsLabel">🐶 検出された犬種:</span>
      {% for b in breed_guides %}
      <a href="/guides/{{ b.slug }}" target="_blank" rel="noopener" data-breed-ja="{{ b.ja }}" data-breed-en="{{ b.en }}">📘 <span class="bname">{{ b.ja }}</span> <span class="bsuffix">ガイドを開く</span></a>
      {% endfor %}
      <button type="button" class="close-btn" onclick="document.getElementById('breedRecs').style.display='none'" aria-label="閉じる">×</button>
    </div>
    {% endif %}
    <iframe class="report-frame" id="reportFrame" srcdoc="{{ report_html | e }}"></iframe>
    <script>
        const TOOLBAR_I18N = {
            en: {
                toolbarTitle: "Orivet Genetics Suite - Report",
                linkSim: "Use in Simulator",
                linkGlossary: "📖 Glossary",
                linkXlsx: "Download Excel",
                linkNew: "New Analysis",
                breedRecsLabel: "🐶 Detected breed:",
                breedRecsSuffix: "Open guide"
            },
            ja: {
                toolbarTitle: "Orivet Genetics Suite - レポート",
                linkSim: "シミュレーターで使う",
                linkGlossary: "📖 辞書",
                linkXlsx: "Excel ダウンロード",
                linkNew: "新しい解析",
                breedRecsLabel: "🐶 検出された犬種:",
                breedRecsSuffix: "ガイドを開く"
            }
        };

        let currentLang = localStorage.getItem('appLang') || 'ja';

        function applyToolbarLang(lang) {
            const dict = TOOLBAR_I18N[lang];
            for (const [id, text] of Object.entries(dict)) {
                const el = document.getElementById(id);
                if (el) el.textContent = text;
            }
            document.getElementById('langToggle').textContent = lang === 'ja' ? 'English' : '日本語';
            document.title = lang === 'en' ? 'Analysis Report - Orivet Genetics Suite' : '解析レポート - Orivet Genetics Suite';
            // Localize breed-rec chips (label + each breed name)
            document.querySelectorAll('.breed-recs a').forEach(a => {
                const ja = a.getAttribute('data-breed-ja');
                const en = a.getAttribute('data-breed-en');
                const nameEl = a.querySelector('.bname');
                const suffixEl = a.querySelector('.bsuffix');
                if (nameEl && ja && en) nameEl.textContent = (lang === 'en') ? en : ja;
                if (suffixEl) suffixEl.textContent = dict.breedRecsSuffix;
                // Append ?lang=en to guide links in EN mode (idempotent)
                const url = new URL(a.href, location.origin);
                if (lang === 'en') url.searchParams.set('lang', 'en');
                else url.searchParams.delete('lang');
                a.href = url.toString();
            });
        }

        function applyIframeLang(lang) {
            const iframe = document.getElementById('reportFrame');
            try {
                const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                if (iframeDoc && typeof iframeDoc.__applyLang === 'function') {
                    iframeDoc.__applyLang(lang);
                } else if (iframe.contentWindow && typeof iframe.contentWindow.__applyLang === 'function') {
                    iframe.contentWindow.__applyLang(lang);
                }
            } catch (e) {}
        }

        function toggleLang() {
            currentLang = currentLang === 'ja' ? 'en' : 'ja';
            localStorage.setItem('appLang', currentLang);
            applyToolbarLang(currentLang);
            applyIframeLang(currentLang);
        }

        applyToolbarLang(currentLang);

        // ====== Tooltip injection into report iframe ======
        // Wraps known genetics terms (P/N, P/P, COI, locus names, etc.) with an
        // <abbr title="..."> so users get a plain-Japanese hover explanation.
        const TOOLTIPS = {{ genetics_tooltips | tojson if genetics_tooltips else '{}' }};

        function escapeRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

        function injectTooltips() {
            const iframe = document.getElementById('reportFrame');
            try {
                const doc = iframe.contentDocument || iframe.contentWindow.document;
                if (!doc || !doc.body) return;
                if (doc.body.dataset.tooltipsApplied === '1') return;
                doc.body.dataset.tooltipsApplied = '1';

                // Build patterns. Longest first so "P/N" doesn't shadow "P/P".
                const terms = Object.keys(TOOLTIPS).sort((a,b) => b.length - a.length);
                if (terms.length === 0) return;

                // Inject styles for the abbr-tooltip
                const style = doc.createElement('style');
                style.textContent = `
                    abbr[data-vg-tip]{ text-decoration: underline dotted #7c3aed; cursor: help; }
                    abbr[data-vg-tip]:hover{ background: #ede9fe; }
                `;
                doc.head.appendChild(style);

                // Walk text nodes and wrap matches
                const walker = doc.createTreeWalker(doc.body, NodeFilter.SHOW_TEXT, {
                    acceptNode(n) {
                        if (!n.nodeValue || !n.nodeValue.trim()) return NodeFilter.FILTER_REJECT;
                        const p = n.parentElement;
                        if (!p) return NodeFilter.FILTER_REJECT;
                        const tag = p.tagName;
                        if (tag === 'SCRIPT' || tag === 'STYLE' || tag === 'ABBR' ||
                            tag === 'TITLE' || tag === 'TEXTAREA' || tag === 'OPTION') {
                            return NodeFilter.FILTER_REJECT;
                        }
                        return NodeFilter.FILTER_ACCEPT;
                    }
                });

                const targets = [];
                let node;
                while ((node = walker.nextNode())) targets.push(node);

                targets.forEach(textNode => {
                    let text = textNode.nodeValue;
                    let matched = false;
                    const frag = doc.createDocumentFragment();
                    while (text.length > 0) {
                        let earliest = -1, earliestTerm = null;
                        for (const term of terms) {
                            const idx = text.indexOf(term);
                            if (idx !== -1 && (earliest === -1 || idx < earliest)) {
                                earliest = idx;
                                earliestTerm = term;
                            }
                        }
                        if (earliest === -1) {
                            frag.appendChild(doc.createTextNode(text));
                            break;
                        }
                        if (earliest > 0) {
                            frag.appendChild(doc.createTextNode(text.slice(0, earliest)));
                        }
                        const abbr = doc.createElement('abbr');
                        abbr.setAttribute('title', TOOLTIPS[earliestTerm]);
                        abbr.setAttribute('data-vg-tip', '1');
                        abbr.textContent = earliestTerm;
                        frag.appendChild(abbr);
                        text = text.slice(earliest + earliestTerm.length);
                        matched = true;
                    }
                    if (matched) textNode.parentNode.replaceChild(frag, textNode);
                });
            } catch (e) {
                // Cross-origin or other access issues: silently skip
            }
        }

        document.getElementById('reportFrame').addEventListener('load', function() {
            applyIframeLang(currentLang);
            injectTooltips();
        });
    </script>
</body>
</html>
