<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="DNA genetic test app favicon">
  <!--
    Compact favicon (64x64). 小サイズで読み取り易さを優先し
    塩基対バーを 3 本に削減、足跡は省略してシルエットをシンプルに。
  -->
  <defs>
    <linearGradient id="bgFav" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5b21b6"/>
      <stop offset="60%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bgFav)"/>
  <g transform="translate(32 32)">
    <g stroke="#ffffff" stroke-width="3.4" fill="none" stroke-linecap="round">
      <path d="M -11 -20 C 8 -14, 8 -2, -11 4 C -30 10, -30 22, -11 28"/>
      <path d="M  11 -20 C -8 -14, -8 -2, 11 4 C 30 10, 30 22, 11 28"/>
    </g>
    <g stroke="#ffffff" stroke-width="2.8" stroke-linecap="round">
      <line x1="-9" y1="-17" x2="9" y2="-17"/>
      <line x1="-9" y1="  4" x2="9" y2="  4"/>
      <line x1="-9" y1=" 25" x2="9" y2=" 25"/>
    </g>
    <g fill="#ffffff">
      <circle cx="-11" cy="-20" r="2.6"/>
      <circle cx=" 11" cy="-20" r="2.6"/>
      <circle cx="-11" cy=" 28" r="2.6"/>
      <circle cx=" 11" cy=" 28" r="2.6"/>
    </g>
  </g>
</svg>
