      <circle cx=" 76" cy="-158" r="12"/>
      <circle cx="-76" cy=" 188" r="12"/>
      <circle cx=" 76" cy=" 188" r="12"/>
    </g>
  </g>

  <!-- 犬の足跡（右下） -->
  <g transform="translate(376 396)" fill="#ffffff" opacity="0.88">
    <ellipse cx="0"   cy="16" rx="36" ry="28"/>
    <ellipse cx="-40" cy="-20" rx="13" ry="16"/>
    <ellipse cx="-14" cy="-38" rx="12" ry="16"/>
    <ellipse cx=" 14" cy="-38" rx="12" ry="16"/>
