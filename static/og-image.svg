<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="犬の遺伝子検査アプリ OG image">
  <!--
    OG image (1200x630). SNS シェア時のサムネイル用。
    左にアイコン、右にアプリ名と短い説明文。
  -->
  <defs>
    <linearGradient id="bgOG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b0764"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="badgeOG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5b21b6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bgOG)"/>

  <!-- 左側のアイコンバッジ -->
  <g transform="translate(120 90)">
    <rect width="360" height="360" rx="80" ry="80" fill="url(#badgeOG)" stroke="rgba(255,255,255,0.18)" stroke-width="2"/>
    <g transform="translate(180 180)">
      <g stroke="#ffffff" stroke-width="13" fill="none" stroke-linecap="round" opacity="0.95">
        <path d="M -56 -116 C 42 -84, 42 -22, -56 12 C -154 46, -154 110, -56 142"/>
        <path d="M  56 -116 C -42 -84, -42 -22, 56 12 C 154 46, 154 110, 56 142"/>
      </g>
      <g stroke="#ffffff" stroke-width="10" stroke-linecap="round">
        <line x1="-46" y1="-108" x2="46" y2="-108"/>
        <line x1="-54" y1=" -70" x2="54" y2=" -70"/>
        <line x1="-50" y1=" -26" x2="50" y2=" -26"/>
        <line x1="-46" y1="  20" x2="46" y2="  20"/>
        <line x1="-54" y1="  62" x2="54" y2="  62"/>
        <line x1="-50" y1=" 104" x2="50" y2=" 104"/>
      </g>
      <g fill="#ffffff">
        <circle cx="-56" cy="-116" r="9"/>
        <circle cx=" 56" cy="-116" r="9"/>
        <circle cx="-56" cy=" 142" r="9"/>
        <circle cx=" 56" cy=" 142" r="9"/>
      </g>
    </g>
    <g transform="translate(266 296)" fill="#ffffff" opacity="0.92">
      <ellipse cx="0"   cy="14" rx="28" ry="22"/>
      <ellipse cx="-32" cy="-16" rx="10" ry="13"/>
      <ellipse cx="-12" cy="-30" rx="9"  ry="12"/>
      <ellipse cx=" 12" cy="-30" rx="9"  ry="12"/>
      <ellipse cx=" 32" cy="-16" rx="10" ry="13"/>
    </g>
  </g>

  <!-- 右側のテキスト -->
  <g transform="translate(540 220)" fill="#ffffff" font-family="'Hiragino Sans','Meiryo','Segoe UI',sans-serif">
    <text x="0" y="0" font-size="64" font-weight="800" letter-spacing="-1">犬の遺伝子検査</text>
    <text x="0" y="76" font-size="48" font-weight="600" opacity="0.92">解析・繁殖シミュレーター</text>
    <text x="0" y="170" font-size="26" font-weight="400" opacity="0.86">健康疾患 + 毛色形質 + COI 予測</text>
    <text x="0" y="206" font-size="26" font-weight="400" opacity="0.86">Mendelian 準拠の遺伝子型・キャリア解析</text>
  </g>

  <!-- 右下のドット装飾 -->
  <g fill="#ffffff" opacity="0.18">
    <circle cx="1110" cy="560" r="10"/>
    <circle cx="1070" cy="540" r="6"/>
    <circle cx="1140" cy="520" r="4"/>
  </g>
</svg>
